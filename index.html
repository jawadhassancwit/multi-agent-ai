```html
<!DOCTYPE html>
<html>
<head>
    <title>Multi-Agent AI</title>
</head>

<body style="
    font-family: Arial;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
">

    <!-- Header -->
    <h2 style="
        background:#222;
        color:white;
        padding:10px;
        margin:0;
        text-align:center;
    ">
        Multi-Agent AI Chat
    </h2>

    <!-- Chat Area -->
    <div id="chat" style="
        flex:1;
        padding:10px;
        overflow-y:auto;
        background:#f0f0f0;
    ">
    </div>

    <!-- Input Area -->
    <div style="
        display:flex;
        padding:10px;
        background:#ddd;
    ">
        <input 
            type="text" 
            id="prompt" 
            placeholder="Enter prompt"
            style="
                flex:1;
                padding:10px;
                font-size:16px;
            "
        >
        <button 
            onclick="sendMessage()"
            style="
                padding:10px;
                margin-left:5px;
            "
        >
            Send
        </button>
    </div>

<script>
async function sendMessage() {
    let input = document.getElementById("prompt");
    let prompt = input.value;

    if (prompt.trim() === "") return;

    let chat = document.getElementById("chat");

    // User message
    chat.innerHTML += `
        <div style="text-align:right; margin:8px;">
            <span style="
                background:#0084ff;
                color:white;
                padding:8px;
                border-radius:8px;
                display:inline-block;
                max-width:60%;
            ">
                ${prompt}
            </span>
        </div>
    `;

    input.value = "";

    // API call (FIXED: encodeURIComponent)
    let response = await fetch(
        "https://web-production-7687b.up.railway.app/chat?prompt=" + encodeURIComponent(prompt),
        { method: "POST" }
    );

    let data = await response.json();

    let output = "";
    let imageUrl = null;

    if (data.response) {
        if (data.response.type === "image") {
            imageUrl = data.response.image;
        } 
        else if (data.response.type === "text") {
            output = data.response.content;
        }
    }

    // IMAGE RESPONSE (FIXED: cache bust)
    if (imageUrl) {
        let newUrl = imageUrl + "&t=" + new Date().getTime();

        chat.innerHTML += `
            <div style="text-align:left; margin:8px;">
                <img src="${newUrl}" style="max-width:300px; border-radius:10px;">
            </div>
        `;
    } 
    else {
        // Clean text
        output = output.replace(/\n/g, "<br>");
        output = output.replace(/```html/g, "");
        output = output.replace(/```/g, "");
        output = output.replace(/###\s?/g, "");
        output = output.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
        output = output.replace(/---/g, "<br>");
        output = output.replace(/[\u{1F300}-\u{1FAFF}]/gu, "");

        chat.innerHTML += `
            <div style="text-align:left; margin:8px;">
                <span style="
                    background:#e5e5ea;
                    padding:8px;
                    border-radius:8px;
                    display:inline-block;
                    max-width:60%;
                ">
                    ${output}
                </span>
            </div>
        `;
    }

    // Auto scroll
    chat.scrollTop = chat.scrollHeight;
}

// Enter key send
document.getElementById("prompt").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
```
