
<!DOCTYPE html>
<html>
<head>
    <title>Multi-Agent AI</title>
</head>

<body style="
    font-family: Arial;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
">

    <!-- Header -->
    <h2 style="
        background:#222;
        color:white;
        padding:10px;
        margin:0;
        text-align:center;
    ">
        Multi-Agent AI Chat
    </h2>

    <!-- Chat Area -->
    <div id="chat" style="
        flex:1;
        padding:10px;
        overflow-y:auto;
        background:#f0f0f0;
    ">
    </div>

    <!-- Input Area -->
    <div style="
        display:flex;
        padding:10px;
        background:#ddd;
    ">
        <input 
            type="text" 
            id="prompt" 
            placeholder="Enter prompt"
            style="
                flex:1;
                padding:10px;
                font-size:16px;
            "
        >
        <button 
            onclick="sendMessage()"
            style="
                padding:10px;
                margin-left:5px;
            "
        >
            Send
        </button>
    </div>

<script>
function escapeHTML(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

async function sendMessage() {
    let input = document.getElementById("prompt");
    let prompt = input.value;

    if (prompt.trim() === "") return;

    let chat = document.getElementById("chat");

    // User message
    chat.innerHTML += `
        <div style="text-align:right; margin:8px;">
            <span style="
                background:#0084ff;
                color:white;
                padding:8px;
                border-radius:8px;
                display:inline-block;
                max-width:60%;
            ">
                ${prompt}
            </span>
        </div>
    `;

    input.value = "";

    // API call (FIXED: encodeURIComponent)
    let response = await fetch(
        "https://web-production-7687b.up.railway.app/chat",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt: prompt })
        }
    );

    let data = await response.json();

    let output = "";
    let imageUrl = null;

    if (data.response) {
        if (data.response.type === "image") {
            imageUrl = data.response.image;
        } 
        else if (data.response.type === "text") {
            output = data.response.content;

            if (typeof output === "string" && output.includes("content")){
                try{
                    let fixed = JSON.parse(output.replace(/'/g, '"'));
                    output = fixed.content || output;
                } catch (e) {
                    // ignoring if parsing files
                }
            }
        }
    }

    // IMAGE RESPONSE (FIXED: cache bust)
    if (imageUrl) {
        let newUrl = imageUrl + "?t=" + new Date().getTime();

        chat.innerHTML += `
            <div style="text-align:left; margin:8px;">
                <img src="${newUrl}" style="max-width:300px; border-radius:10px;">
            </div>
        `;
    } 
    else {
        // Clean text
        output = escapeHTML(output);

// Remove markdown & junk
        output = output
            .replace(/```html/g, "")
            .replace(/```/g, "")
            .replace(/###\s?/g, "")
            .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
            .replace(/---/g, "")
            .replace(/[\u{1F300}-\u{1FAFF}]/gu, "");

// 🔥 FIX: normalize line breaks
        output = output.replace(/\r\n/g, "\n");

// 🔥 FIX: ensure proper paragraph splitting
        let paragraphs = output.split(/\n\s*\n/);

// 🔥 FIX: clean each paragraph
        output = paragraphs
            .map(p => p.trim())
            .filter(p => p.length > 0)
            .map(p => `<p style="margin:10px 0; line-height:1.6;">${p}</p>`)
            .join("");

        chat.innerHTML += `
            <div style="text-align:left; margin:8px;">
                <span style="
                    background:#e5e5ea;
                    padding:8px;
                    border-radius:8px;
                    display:inline-block;
                    max-width:60%;
                ">
                    ${output}
                </span>
            </div>
        `;
    }

    // Auto scroll
    chat.scrollTop = chat.scrollHeight;
}

// Enter key send
document.getElementById("prompt").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
